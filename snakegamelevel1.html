<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐍 SNAKE CHAMPION · GBA EDITION</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #1e2f3b 0%, #15242b 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            padding: 0.8rem;
        }

        .snake-game {
            max-width: 520px;
            width: 100%;
            margin: 0 auto;
            background: #1c2c36;
            padding: 1.5rem 1.2rem 1.5rem;
            border-radius: 2rem;
            box-shadow: 0 25px 35px -8px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(255,255,255,0.06);
            border: 2px solid #3f626b;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #gameCanvas {
            background-color: #0e191f;
            border-radius: 1.2rem;
            display: block;
            box-shadow: inset 0 0 15px #030708, 0 10px 10px rgba(0,0,0,0.4);
            border: 3px solid #2d4a53;
            width: 100%;
            height: auto;
            aspect-ratio: 1/1;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            touch-action: none;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-top: 1rem;
            margin-bottom: 0.8rem;
            color: #bed7da;
            font-weight: 600;
            font-size: 1.2rem;
            text-shadow: 0 2px 0 #0b1215;
            letter-spacing: 1px;
            background: #142129;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            border: 1px solid #3f626b;
            box-shadow: inset 0 2px 3px #0c1519;
        }

        .score, .high-score {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .badge {
            background: #263b42;
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            color: #e2f3f5;
            border-bottom: 2px solid #4e7984;
            font-size: 1.1rem;
        }

        /* ===== 🎮 GAMEBOY ADVANCE STYLE CONTROLS ===== */
        .gba-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-top: 1rem;
            gap: 1rem;
        }

        /* D-Pad - GameBoy Advance Style */
        .dpad {
            position: relative;
            width: 160px;
            height: 160px;
            background: #0e1a1f;
            border-radius: 50%;
            box-shadow: 
                0 8px 0 #0b1519,
                0 12px 20px rgba(0,0,0,0.5),
                inset 0 -4px 0 #2a3a42,
                inset 0 4px 8px rgba(255,255,255,0.1);
            border: 2px solid #2d4a53;
            flex-shrink: 0;
        }

        .dpad-btn {
            position: absolute;
            width: 50px;
            height: 50px;
            background: #263f48;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ebfdfe;
            font-size: 2rem;
            font-weight: bold;
            border-radius: 12px;
            box-shadow: 
                0 6px 0 #0e1c21,
                0 8px 10px rgba(0,0,0,0.4),
                inset 0 -2px 0 #324e57,
                inset 0 2px 4px rgba(255,255,255,0.2);
            cursor: pointer;
            transition: all 0.03s ease;
            user-select: none;
            -webkit-touch-callout: none;
            touch-action: manipulation;
            border: 1px solid #4e7984;
        }

        .dpad-btn:active {
            transform: translateY(4px);
            box-shadow: 
                0 2px 0 #0e1c21,
                0 8px 10px rgba(0,0,0,0.4),
                inset 0 -2px 0 #324e57;
        }

        .dpad-up {
            top: 5px;
            left: 55px;
        }

        .dpad-down {
            bottom: 5px;
            left: 55px;
        }

        .dpad-left {
            left: 5px;
            top: 55px;
        }

        .dpad-right {
            right: 5px;
            top: 55px;
        }

        /* Action Buttons - GameBoy Advance Style */
        .action-buttons {
            display: flex;
            gap: 1rem;
            align-items: center;
            justify-content: flex-end;
        }

        .gba-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #4a2a2a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffb0b0;
            font-weight: bold;
            font-size: 1rem;
            box-shadow: 
                0 8px 0 #2a1a1a,
                0 12px 20px rgba(0,0,0,0.5),
                inset 0 -4px 0 #5a3a3a,
                inset 0 4px 8px rgba(255,200,200,0.3);
            border: 2px solid #8b4e4e;
            cursor: pointer;
            transition: all 0.03s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            user-select: none;
            -webkit-touch-callout: none;
            touch-action: manipulation;
        }

        .gba-btn span {
            font-size: 1.4rem;
            margin-bottom: 2px;
        }

        .gba-btn:active {
            transform: translateY(4px);
            box-shadow: 
                0 4px 0 #2a1a1a,
                0 12px 20px rgba(0,0,0,0.5),
                inset 0 -2px 0 #5a3a3a;
        }

        .btn-a {
            background: #3a7a5a;
            border-color: #7ac47a;
            color: #e2ffe2;
            box-shadow: 0 8px 0 #1e4a3b, 0 12px 20px rgba(0,0,0,0.5), inset 0 -4px 0 #2a5a4a;
        }

        .btn-b {
            background: #7a4a4a;
            border-color: #ff8a8a;
            color: #ffe2e2;
            box-shadow: 0 8px 0 #4a2a2a, 0 12px 20px rgba(0,0,0,0.5), inset 0 -4px 0 #5a3a3a;
        }

        .btn-select, .btn-start {
            width: 50px;
            height: 30px;
            border-radius: 20px;
            flex-direction: row;
            background: #263f48;
            border-color: #4e7984;
            color: #bed7da;
            font-size: 0.8rem;
            box-shadow: 0 6px 0 #0e1c21;
        }

        .btn-select span, .btn-start span {
            font-size: 0.9rem;
            margin: 0;
        }

        .gba-extra {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .restart-btn {
            background: #2e4c57;
            border: none;
            border-bottom: 5px solid #172e35;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: 0.08s ease;
            box-shadow: 0 7px 0 #0f1e22, 0 8px 10px black;
            text-transform: uppercase;
            letter-spacing: 2px;
            width: 100%;
            touch-action: manipulation;
        }

        .restart-btn:active {
            border-bottom-width: 2px;
            transform: translateY(4px);
            box-shadow: 0 3px 0 #0f1e22, 0 8px 10px black;
        }

        .hint {
            color: #6e949b;
            margin-top: 1rem;
            font-size: 0.8rem;
            font-weight: 600;
            text-align: center;
        }

        .save-confirmation {
            background: #1e4a3b;
            color: #d4ffb0;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            margin-top: 0.5rem;
            font-size: 0.9rem;
            border: 1px solid #7ac47a;
            display: inline-block;
            animation: fadeOut 3s forwards;
        }

        /* ===== MODAL STYLES ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .gameover-modal {
            background: #1c2c36;
            border: 3px solid #4e7984;
            border-radius: 2rem;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 15px 30px rgba(0,0,0,0.6), inset 0 0 15px rgba(255,255,255,0.05);
            text-align: center;
            color: #e2f3f5;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .gameover-modal h2 {
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            color: #ffb347;
            text-shadow: 0 0 10px #ff8c00;
            letter-spacing: 3px;
        }

        .score-big {
            font-size: 2rem;
            background: #0e191f;
            padding: 0.5rem;
            border-radius: 1rem;
            margin: 1rem 0;
            border: 1px solid #3f626b;
        }

        .new-highscore {
            background: #ffd700;
            color: #1a2a32;
            font-weight: bold;
            padding: 0.5rem;
            border-radius: 2rem;
            margin: 0.5rem 0;
            font-size: 1.2rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .modal-input {
            width: 100%;
            padding: 1rem;
            margin: 1rem 0;
            background: #0e191f;
            border: 2px solid #3f626b;
            border-radius: 2rem;
            color: white;
            font-size: 1.2rem;
            font-family: 'Courier New', monospace;
            text-align: center;
            outline: none;
        }

        .modal-input:focus {
            border-color: #7ac47a;
            box-shadow: 0 0 15px #7ac47a;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .modal-btn {
            flex: 1;
            padding: 1rem;
            border: none;
            border-bottom: 5px solid #172e35;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 2rem;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: 0.08s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .restart-modal-btn {
            background: #2e8b57;
            border-bottom-color: #1e4a3b;
        }

        .menu-modal-btn {
            background: #4a5568;
            border-bottom-color: #2d3748;
        }

        .modal-btn:active {
            border-bottom-width: 2px;
            transform: translateY(3px);
        }

        /* ===== LOADING SCREEN ===== */
        .game-loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 18, 20, 0.95);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .game-loading.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .loading-content {
            text-align: center;
            color: #b0e57c;
        }

        .loading-snake {
            width: 100px;
            height: 100px;
            margin: 0 auto 2rem;
            position: relative;
        }

        .snake-head {
            width: 20px;
            height: 20px;
            background: #b0e57c;
            position: absolute;
            top: 40px;
            left: 40px;
            border-radius: 4px;
            animation: moveSnake 1.2s infinite;
            box-shadow: 0 0 15px #6f9e4c;
        }

        .snake-body {
            width: 16px;
            height: 16px;
            background: #8cc084;
            position: absolute;
            border-radius: 4px;
        }

        .body1 {
            top: 40px;
            left: 20px;
            animation: moveBody1 1.2s infinite;
        }

        .body2 {
            top: 40px;
            left: 0px;
            animation: moveBody2 1.2s infinite;
        }

        @keyframes moveSnake {
            0% { transform: translateX(0); }
            25% { transform: translateX(20px); }
            50% { transform: translateY(20px) translateX(20px); }
            75% { transform: translateY(20px) translateX(0); }
            100% { transform: translateX(0); }
        }

        @keyframes moveBody1 {
            0% { transform: translateX(0); opacity: 0.9; }
            25% { transform: translateX(20px); opacity: 0.7; }
            50% { transform: translateY(20px) translateX(20px); opacity: 0.9; }
            75% { transform: translateY(20px) translateX(0); opacity: 0.7; }
            100% { transform: translateX(0); opacity: 0.9; }
        }

        @keyframes moveBody2 {
            0% { transform: translateX(0); opacity: 0.7; }
            25% { transform: translateX(20px); opacity: 0.5; }
            50% { transform: translateY(20px) translateX(20px); opacity: 0.7; }
            75% { transform: translateY(20px) translateX(0); opacity: 0.5; }
            100% { transform: translateX(0); opacity: 0.7; }
        }

        .loading-text {
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 4px;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 10px #6f9e4c;
        }

        .loading-sub {
            color: #8aaab3;
            font-size: 1rem;
        }

        /* ===== RESPONSIVE DESIGN ===== */
        @media (max-width: 500px) {
            .snake-game {
                padding: 1rem 0.8rem;
            }
            
            .stats {
                font-size: 1rem;
                padding: 0.5rem 0.8rem;
            }
            
            .badge {
                padding: 0.2rem 0.6rem;
                font-size: 0.9rem;
            }
            
            .dpad {
                width: 140px;
                height: 140px;
            }
            
            .dpad-btn {
                width: 45px;
                height: 45px;
                font-size: 1.6rem;
            }
            
            .dpad-up { left: 47px; }
            .dpad-down { left: 47px; }
            .dpad-left { top: 47px; }
            .dpad-right { top: 47px; }
            
            .gba-btn {
                width: 60px;
                height: 60px;
            }
            
            .btn-select, .btn-start {
                width: 45px;
                height: 28px;
            }
        }

        @media (max-width: 400px) {
            .gba-controls {
                flex-direction: column;
                gap: 1rem;
            }
            
            .action-buttons {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="snake-game">
        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="stats">
            <div class="score">🍎 <span id="scoreDisplay" class="badge">0</span></div>
            <div class="high-score">🏆 <span id="highScoreDisplay" class="badge">0</span></div>
        </div>

        <!-- ===== 🎮 GAMEBOY ADVANCE STYLE CONTROLS ===== -->
        <div class="gba-controls">
            <!-- D-Pad -->
            <div class="dpad">
                <button class="dpad-btn dpad-up" data-dir="up" aria-label="Up">▲</button>
                <button class="dpad-btn dpad-down" data-dir="down" aria-label="Down">▼</button>
                <button class="dpad-btn dpad-left" data-dir="left" aria-label="Left">◀</button>
                <button class="dpad-btn dpad-right" data-dir="right" aria-label="Right">▶</button>
            </div>
            
            <!-- Action Buttons -->
            <div class="action-buttons">
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <button class="gba-btn btn-a" id="gbaRestartBtn" aria-label="A - Restart">
                        <span>A</span>
                        ⟳
                    </button>
                    <button class="gba-btn btn-b" id="gbaMenuBtn" aria-label="B - Menu">
                        <span>B</span>
                        🏠
                    </button>
                </div>

            </div>
        </div>

        <!-- Original restart button (hidden on mobile, visible on desktop) -->
        <button class="restart-btn" id="restartButton" style="margin-top: 0.5rem;">⟳ NEW GAME</button>
        
        <div class="hint">
            <span style="background: #263f48; padding: 0.2rem 0.8rem; border-radius: 1rem; margin-right: 0.5rem;">🔄 GBA STYLE</span>
            ← → ↑ ↓ · eat apples · enter name for leaderboard
        </div>
        <div id="saveMessage" style="height: 24px; margin-top: 8px;"></div>
    </div>

    <!-- ===== 🎯 CUSTOM GAME OVER MODAL ===== -->
    <div id="gameoverModal" class="modal-overlay">
        <div class="gameover-modal">
            <h2>⚡ GAME OVER</h2>
            <div id="modalHighScoreBadge" class="new-highscore" style="display: none;">🏆 NEW HIGH SCORE! 🏆</div>
            <div class="score-big" id="modalScoreDisplay">0</div>
            
            <input type="text" id="playerNameInput" class="modal-input" placeholder="ENTER YOUR NAME" maxlength="20" autocomplete="off" inputmode="text">
            
            <div class="modal-buttons">
                <button id="modalRestartBtn" class="modal-btn restart-modal-btn">⟳ RESTART</button>
                <button id="modalMenuBtn" class="modal-btn menu-modal-btn">🏠 MENU</button>
            </div>
            <p style="color: #8aaab3; margin-top: 1rem; font-size: 0.9rem;">press ENTER to save & restart</p>
        </div>
    </div>

    <script>
        (function(){
            "use strict";

            // ============================================
            // 🎮 YOUR GOOGLE SHEETS WEB APP URL
            // ============================================
            const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwmmbokNi1duI22Ds4f3LX2iwpqX-Ig4pDZKFl0F9z-3bVdehk83DWlHekUHJDqy4_4sA/exec";
            
            // ============================================
            // 🎮 CREATE LOADING SCREEN
            // ============================================
            function createLoadingScreen() {
                const loadingDiv = document.createElement('div');
                loadingDiv.className = 'game-loading';
                loadingDiv.id = 'gameLoading';
                loadingDiv.innerHTML = `
                    <div class="loading-content">
                        <div class="loading-snake">
                            <div class="snake-head"></div>
                            <div class="snake-body body1"></div>
                            <div class="snake-body body2"></div>
                        </div>
                        <div class="loading-text">LOADING GAME</div>
                        <div class="loading-sub">fetching global high score...</div>
                    </div>
                `;
                document.body.appendChild(loadingDiv);
                return loadingDiv;
            }

            // ============================================
            // 🏆 LOAD REAL HIGH SCORE FROM SHEETS
            // ============================================
            async function loadGlobalHighScore(loadingScreen) {
                try {
                    const response = await fetch(WEB_APP_URL + '?cb=' + Date.now());
                    const topScores = await response.json();
                    
                    if (topScores && topScores.length > 0) {
                        const globalHighScore = topScores[0].score;
                        const localHighScore = localStorage.getItem('snakeHighScore') ? 
                            parseInt(localStorage.getItem('snakeHighScore')) : 0;
                        
                        highScore = Math.max(globalHighScore, localHighScore);
                        localStorage.setItem('snakeHighScore', highScore);
                        highScoreSpan.textContent = highScore;
                        
                        console.log('🏆 Global high score:', globalHighScore);
                    }
                } catch (error) {
                    console.error('Could not load global high score:', error);
                    highScore = localStorage.getItem('snakeHighScore') ? 
                        parseInt(localStorage.getItem('snakeHighScore')) : 0;
                    highScoreSpan.textContent = highScore;
                } finally {
                    setTimeout(() => {
                        loadingScreen.classList.add('fade-out');
                        setTimeout(() => {
                            loadingScreen.remove();
                        }, 500);
                    }, 300);
                }
            }

            // ============================================
            // 🐍 SNAKE GAME ENGINE
            // ============================================
            const GRID_SIZE = 20;
            const CELL_SIZE = 20;
            const TICK_INTERVAL_MS = 150;

            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const scoreSpan = document.getElementById('scoreDisplay');
            const highScoreSpan = document.getElementById('highScoreDisplay');
            const saveMessageEl = document.getElementById('saveMessage');

            // Modal elements
            const modal = document.getElementById('gameoverModal');
            const modalScore = document.getElementById('modalScoreDisplay');
            const modalHighScoreBadge = document.getElementById('modalHighScoreBadge');
            const playerNameInput = document.getElementById('playerNameInput');
            const modalRestartBtn = document.getElementById('modalRestartBtn');
            const modalMenuBtn = document.getElementById('modalMenuBtn');

            let snake = [];
            let food = { x: 8, y: 10 };
            let direction = 'right';
            let nextDirection = 'right';
            let score = 0;
            let highScore = 0;
            let gameActive = false;
            let gameOverFlag = false;
            let gameInterval = null;
            let currentScoreForModal = 0;

            highScoreSpan.textContent = highScore;

            // ============================================
            // 🎯 MODAL CONTROLS
            // ============================================
            function showGameOverModal(finalScore, isHighScore) {
                currentScoreForModal = finalScore;
                modalScore.textContent = finalScore;
                
                if (isHighScore) {
                    modalHighScoreBadge.style.display = 'block';
                } else {
                    modalHighScoreBadge.style.display = 'none';
                }
                
                playerNameInput.value = '';
                modal.classList.add('active');
                setTimeout(() => playerNameInput.focus(), 200);
            }

            function hideGameOverModal() {
                modal.classList.remove('active');
            }

            // ============================================
            // 📊 SAVE SCORE TO GOOGLE SHEETS
            // ============================================
            async function saveScoreToSheet(playerName, playerScore) {
                saveMessageEl.innerHTML = '<span class="save-confirmation">📤 Sending to leaderboard...</span>';
                
                try {
                    await fetch(WEB_APP_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ 
                            name: playerName, 
                            score: playerScore,
                            timestamp: new Date().toISOString()
                        })
                    });
                    
                    saveMessageEl.innerHTML = '<span class="save-confirmation">✅ Saved to leaderboard! Check Google Sheets</span>';
                    
                    const savedScores = JSON.parse(localStorage.getItem('snakeLeaderboard') || '[]');
                    savedScores.push({ name: playerName, score: playerScore, date: new Date().toISOString() });
                    localStorage.setItem('snakeLeaderboard', JSON.stringify(savedScores));
                    
                } catch (error) {
                    console.error('Save error:', error);
                    saveMessageEl.innerHTML = '<span style="color: #ffb0b0;">⚠️ Offline - saved locally</span>';
                    
                    const pendingScores = JSON.parse(localStorage.getItem('pendingSnakeScores') || '[]');
                    pendingScores.push({ name: playerName, score: playerScore, date: new Date().toISOString() });
                    localStorage.setItem('pendingSnakeScores', JSON.stringify(pendingScores));
                }
                
                setTimeout(() => {
                    saveMessageEl.innerHTML = '';
                }, 4000);
            }

            // ============================================
            // 🏆 GAME OVER
            // ============================================
            function gameOver() {
                gameActive = false;
                gameOverFlag = true;
                if (gameInterval) {
                    clearInterval(gameInterval);
                    gameInterval = null;
                }
                drawBoard();
                
                if (score > 0) {
                    const isHighScore = score > highScore;
                    showGameOverModal(score, isHighScore);
                    
                    if (isHighScore) {
                        highScore = score;
                        localStorage.setItem('snakeHighScore', highScore);
                        highScoreSpan.textContent = highScore;
                    }
                }
            }

            // ============================================
            // 🎮 HANDLE NAME SUBMISSION
            // ============================================
            function handleNameSubmit() {
                const playerName = playerNameInput.value.trim();
                
                if (playerName !== "") {
                    saveScoreToSheet(playerName, currentScoreForModal);
                }
                
                hideGameOverModal();
                resetGame();
            }

            // ============================================
            // 🎮 HANDLE MENU
            // ============================================
            function handleMenuClick() {
                const playerName = playerNameInput.value.trim();
                
                if (playerName !== "") {
                    saveMessageEl.innerHTML = '<span class="save-confirmation">📤 Saving score before exit...</span>';
                    saveScoreToSheet(playerName, currentScoreForModal);
                }
                
                setTimeout(() => {
                    window.location.href = 'indexsnake.html';
                }, 300);
            }

            // ============================================
            // ⚙️ GAME TICK
            // ============================================
            function gameTick() {
                if (!gameActive) return;

                direction = nextDirection;

                const head = snake[0];
                let newHead = { ...head };

                switch (direction) {
                    case 'right': newHead.x += 1; break;
                    case 'left':  newHead.x -= 1; break;
                    case 'up':    newHead.y -= 1; break;
                    case 'down':  newHead.y += 1; break;
                }

                if (newHead.x < 0 || newHead.x >= GRID_SIZE || newHead.y < 0 || newHead.y >= GRID_SIZE) {
                    gameOver();
                    return;
                }

                const isEating = (newHead.x === food.x && newHead.y === food.y);
                let newSnake = [newHead, ...snake];

                if (isEating) {
                    snake = newSnake;
                    score += 10;
                    scoreSpan.textContent = score;
                    
                    const foodPlaced = generateRandomFood();
                    if (!foodPlaced) {
                        gameActive = false;
                        gameOverFlag = true;
                        clearInterval(gameInterval);
                        gameInterval = null;
                        drawBoard();
                        return;
                    }
                } else {
                    newSnake.pop();
                    snake = newSnake;
                }

                const headCollision = snake.slice(1).some(segment => segment.x === snake[0].x && segment.y === snake[0].y);
                if (headCollision) {
                    gameOver();
                    return;
                }

                drawBoard();
            }

            function initSnake() {
                snake = [
                    { x: 10, y: 10 },
                    { x: 9, y: 10 },
                    { x: 8, y: 10 },
                    { x: 7, y: 10 }
                ];
            }

            function generateRandomFood() {
                const maxAttempts = 2000;
                for (let attempt = 0; attempt < maxAttempts; attempt++) {
                    const randX = Math.floor(Math.random() * GRID_SIZE);
                    const randY = Math.floor(Math.random() * GRID_SIZE);
                    if (!snake.some(segment => segment.x === randX && segment.y === randY)) {
                        food = { x: randX, y: randY };
                        return true;
                    }
                }
                for (let y = 0; y < GRID_SIZE; y++) {
                    for (let x = 0; x < GRID_SIZE; x++) {
                        if (!snake.some(s => s.x === x && s.y === y)) {
                            food = { x, y };
                            return true;
                        }
                    }
                }
                return false;
            }

            function drawBoard() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                ctx.strokeStyle = '#1e3a41';
                ctx.lineWidth = 0.4;
                for (let i = 0; i <= GRID_SIZE; i++) {
                    ctx.beginPath();
                    ctx.moveTo(i * CELL_SIZE, 0);
                    ctx.lineTo(i * CELL_SIZE, canvas.height);
                    ctx.stroke();
                    ctx.moveTo(0, i * CELL_SIZE);
                    ctx.lineTo(canvas.width, i * CELL_SIZE);
                    ctx.stroke();
                }

                ctx.fillStyle = '#ff3b4a';
                ctx.shadowBlur = 6;
                ctx.shadowColor = '#ff8caa';
                ctx.beginPath();
                ctx.arc(food.x * CELL_SIZE + CELL_SIZE/2, food.y * CELL_SIZE + CELL_SIZE/2, CELL_SIZE/2 - 2, 0, 2 * Math.PI);
                ctx.fill();
                ctx.shadowBlur = 0;
                
                ctx.fillStyle = '#ffd0d6';
                ctx.beginPath();
                ctx.arc(food.x * CELL_SIZE + 7, food.y * CELL_SIZE + 6, 2, 0, 2 * Math.PI);
                ctx.fill();

                for (let i = 0; i < snake.length; i++) {
                    const seg = snake[i];
                    const x = seg.x * CELL_SIZE;
                    const y = seg.y * CELL_SIZE;
                    
                    if (i === 0) {
                        ctx.fillStyle = '#b0e57c';
                        ctx.shadowBlur = 6;
                        ctx.shadowColor = '#6f9e4c';
                        ctx.fillRect(x + 2, y + 2, CELL_SIZE - 4, CELL_SIZE - 4);
                        ctx.shadowBlur = 0;
                        
                        ctx.fillStyle = '#1e2f2f';
                        if (direction === 'right') {
                            ctx.beginPath(); ctx.arc(x + 13, y + 7, 2.2, 0, 2 * Math.PI); ctx.fill();
                            ctx.beginPath(); ctx.arc(x + 13, y + 13, 2.2, 0, 2 * Math.PI); ctx.fill();
                        } else if (direction === 'left') {
                            ctx.beginPath(); ctx.arc(x + 7, y + 7, 2.2, 0, 2 * Math.PI); ctx.fill();
                            ctx.beginPath(); ctx.arc(x + 7, y + 13, 2.2, 0, 2 * Math.PI); ctx.fill();
                        } else if (direction === 'up') {
                            ctx.beginPath(); ctx.arc(x + 7, y + 7, 2.2, 0, 2 * Math.PI); ctx.fill();
                            ctx.beginPath(); ctx.arc(x + 13, y + 7, 2.2, 0, 2 * Math.PI); ctx.fill();
                        } else {
                            ctx.beginPath(); ctx.arc(x + 7, y + 13, 2.2, 0, 2 * Math.PI); ctx.fill();
                            ctx.beginPath(); ctx.arc(x + 13, y + 13, 2.2, 0, 2 * Math.PI); ctx.fill();
                        }
                    } else {
                        ctx.fillStyle = '#8cc084';
                        ctx.shadowBlur = 4;
                        ctx.shadowColor = '#507a5e';
                        ctx.fillRect(x + 2, y + 2, CELL_SIZE - 4, CELL_SIZE - 4);
                    }
                }
                ctx.shadowBlur = 0;
            }

            function setDirection(newDir) {
                if (!gameActive) return;
                if (
                    (direction === 'right' && newDir === 'left') ||
                    (direction === 'left' && newDir === 'right') ||
                    (direction === 'up' && newDir === 'down') ||
                    (direction === 'down' && newDir === 'up')
                ) {
                    return;
                }
                nextDirection = newDir;
            }

            function resetGame() {
                if (gameInterval) {
                    clearInterval(gameInterval);
                    gameInterval = null;
                }

                initSnake();
                direction = 'right';
                nextDirection = 'right';
                score = 0;
                scoreSpan.textContent = score;
                gameActive = true;
                gameOverFlag = false;
                
                generateRandomFood();
                drawBoard();
                
                gameInterval = setInterval(() => {
                    if (gameActive && !gameOverFlag) {
                        gameTick();
                    }
                }, TICK_INTERVAL_MS);
            }

            // ============================================
            // 🎮 EVENT LISTENERS - GBA CONTROLS
            // ============================================
            
            // D-Pad controls
            document.querySelectorAll('.dpad-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const dir = e.currentTarget.getAttribute('data-dir');
                    if (dir) setDirection(dir);
                });
                
                // Touch optimization
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    const dir = e.currentTarget.getAttribute('data-dir');
                    if (dir) setDirection(dir);
                });
            });

            // GBA Action Buttons
            const gbaRestartBtn = document.getElementById('gbaRestartBtn');
            if (gbaRestartBtn) {
                gbaRestartBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    resetGame();
                });
            }

            const gbaMenuBtn = document.getElementById('gbaMenuBtn');
            if (gbaMenuBtn) {
                gbaMenuBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    window.location.href = "indexsnake.html";
                });
            }

            const gbaSelectBtn = document.getElementById('gbaSelectBtn');
            if (gbaSelectBtn) {
                gbaSelectBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    // Show high score or something
                    alert(`🏆 Current High Score: ${highScore}`);
                });
            }

            const gbaStartBtn = document.getElementById('gbaStartBtn');
            if (gbaStartBtn) {
                gbaStartBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    resetGame();
                });
            }

            // Keyboard controls
            window.addEventListener('keydown', (e) => {
                if (e.key.startsWith('Arrow')) e.preventDefault();
                
                if (e.key === 'ArrowUp') setDirection('up');
                if (e.key === 'ArrowDown') setDirection('down');
                if (e.key === 'ArrowLeft') setDirection('left');
                if (e.key === 'ArrowRight') setDirection('right');
                if (e.key === 'r' || e.key === 'R') resetGame();
                
                if (e.key === 'Enter' && modal.classList.contains('active')) {
                    e.preventDefault();
                    handleNameSubmit();
                }
                
                if (e.key === 'Escape' && modal.classList.contains('active')) {
                    e.preventDefault();
                    hideGameOverModal();
                    resetGame();
                }
            });

            // Original restart button
            document.getElementById('restartButton').addEventListener('click', resetGame);
            
            // Modal buttons
            modalRestartBtn.addEventListener('click', handleNameSubmit);
            modalMenuBtn.addEventListener('click', handleMenuClick);

            // Prevent zoom on double tap for mobile
            document.querySelectorAll('button').forEach(btn => {
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                }, { passive: false });
            });

            // ============================================
            // 🚀 START THE GAME
            // ============================================
            
            const loadingScreen = createLoadingScreen();
            loadGlobalHighScore(loadingScreen).then(() => {
                resetGame();
            });
        })();
    </script>
</body>
</html>
