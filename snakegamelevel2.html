<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 SNAKE CHAMPION · LEVEL 2 · SPEED MODE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1e2f3b 0%, #15242b 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            padding: 1rem;
        }

        .snake-game {
            max-width: 520px;
            width: fit-content;
            margin: 0 auto;
            background: #1c2c36;
            padding: 2rem 2rem 1.8rem;
            border-radius: 2.5rem;
            box-shadow: 0 25px 35px -8px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(255,255,255,0.06);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        #gameCanvas {
            background-color: #0e191f;
            border-radius: 1.2rem;
            display: block;
            box-shadow: inset 0 0 15px #030708, 0 10px 10px rgba(0,0,0,0.4);
            border: 3px solid #2d4a53;
            width: 400px;
            height: 400px;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-top: 1.4rem;
            margin-bottom: 0.5rem;
            color: #bed7da;
            font-weight: 600;
            font-size: 1.4rem;
            text-shadow: 0 2px 0 #0b1215;
            letter-spacing: 1px;
            background: #142129;
            padding: 0.7rem 1.8rem;
            border-radius: 3rem;
            border: 1px solid #3f626b;
            box-shadow: inset 0 2px 3px #0c1519;
        }

        .score, .high-score, .level {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .badge {
            background: #263b42;
            padding: 0.2rem 0.9rem;
            border-radius: 2rem;
            color: #e2f3f5;
            border-bottom: 2px solid #4e7984;
        }

        .speed-indicator {
            background: #1e3a41;
            height: 8px;
            border-radius: 4px;
            margin-top: 0.5rem;
            width: 100%;
            overflow: hidden;
        }

        .speed-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #b0e57c, #ffb347);
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 0.9rem;
            margin-top: 0.8rem;
            width: 100%;
        }

        .restart-btn {
            background: #2e4c57;
            border: none;
            border-bottom: 5px solid #172e35;
            color: white;
            font-size: 1.3rem;
            font-weight: bold;
            padding: 0.6rem 2rem;
            border-radius: 3rem;
            letter-spacing: 2px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: 0.08s ease;
            box-shadow: 0 7px 0 #0f1e22, 0 8px 10px black;
            text-transform: uppercase;
        }

        .restart-btn:active {
            border-bottom-width: 2px;
            transform: translateY(4px);
            box-shadow: 0 3px 0 #0f1e22, 0 8px 10px black;
        }

        .arrow-panel {
            display: flex;
            gap: 0.4rem;
            background: #17262b;
            padding: 0.5rem 0.8rem;
            border-radius: 3.5rem;
            border: 1px solid #3f656e;
        }

        .arrow-btn {
            background: #263f48;
            border: none;
            border-bottom: 4px solid #0e1c21;
            color: #ebfdfe;
            font-size: 1.8rem;
            font-weight: bold;
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 1.5rem;
            cursor: pointer;
            transition: 0.06s;
            box-shadow: inset 0 -2px 0 #324e57, 0 5px 0 #0b1519;
            font-family: monospace;
        }

        .arrow-btn:active {
            border-bottom-width: 2px;
            transform: translateY(4px);
            box-shadow: inset 0 -2px 0 #324e57, 0 2px 0 #0b1519;
        }

        .hint {
            color: #6e949b;
            margin-top: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .save-confirmation {
            background: #1e4a3b;
            color: #d4ffb0;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            margin-top: 0.5rem;
            font-size: 0.9rem;
            border: 1px solid #7ac47a;
            display: inline-block;
            animation: fadeOut 3s forwards;
        }

        /* ===== 🎯 CUSTOM GAME OVER MODAL ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .gameover-modal {
            background: #1c2c36;
            border: 3px solid #4e7984;
            border-radius: 2rem;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 15px 30px rgba(0,0,0,0.6), inset 0 0 15px rgba(255,255,255,0.05);
            text-align: center;
            color: #e2f3f5;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .gameover-modal h2 {
            font-size: 2.2rem;
            margin-bottom: 0.5rem;
            color: #ffb347;
            text-shadow: 0 0 10px #ff8c00;
            letter-spacing: 3px;
        }

        .score-big {
            font-size: 2rem;
            background: #0e191f;
            padding: 0.5rem;
            border-radius: 1rem;
            margin: 1rem 0;
            border: 1px solid #3f626b;
        }

        .new-highscore {
            background: #ffd700;
            color: #1a2a32;
            font-weight: bold;
            padding: 0.5rem;
            border-radius: 2rem;
            margin: 0.5rem 0;
            font-size: 1.2rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .modal-input {
            width: 100%;
            padding: 1rem;
            margin: 1rem 0;
            background: #0e191f;
            border: 2px solid #3f626b;
            border-radius: 2rem;
            color: white;
            font-size: 1.2rem;
            font-family: 'Courier New', monospace;
            text-align: center;
            outline: none;
        }

        .modal-input:focus {
            border-color: #7ac47a;
            box-shadow: 0 0 15px #7ac47a;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .modal-btn {
            flex: 1;
            padding: 1rem;
            border: none;
            border-bottom: 5px solid #172e35;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 2rem;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: 0.08s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .restart-modal-btn {
            background: #2e8b57;
            border-bottom-color: #1e4a3b;
        }

        .menu-modal-btn {
            background: #4a5568;
            border-bottom-color: #2d3748;
        }

        .modal-btn:active {
            border-bottom-width: 2px;
            transform: translateY(3px);
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }

        @media (max-width: 500px) {
            .snake-game { padding: 1.3rem; }
            #gameCanvas { width: 300px; height: 300px; }
            .stats { font-size: 1.1rem; padding: 0.5rem 1rem; }
            .arrow-btn { width: 50px; height: 50px; font-size: 1.5rem; }
            .gameover-modal { width: 95%; padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="snake-game">
        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="stats">
            <div class="score">🍎 <span id="scoreDisplay" class="badge">0</span></div>
            <div class="level">⚡ <span id="levelDisplay" class="badge">1</span></div>
            <div class="high-score">🏆 <span id="highScoreDisplay" class="badge">0</span></div>
        </div>
        
        <div class="speed-indicator">
            <div id="speedFill" class="speed-fill" style="width: 0%;"></div>
        </div>

        <div class="controls">
            <button class="restart-btn" id="restartButton">⟳ new</button>
            
            <div class="arrow-panel">
                <button class="arrow-btn" data-dir="up"><span>▲</span></button>
                <button class="arrow-btn" data-dir="left"><span>◀</span></button>
                <button class="arrow-btn" data-dir="down"><span>▼</span></button>
                <button class="arrow-btn" data-dir="right"><span>▶</span></button>
            </div>
        </div>
        <div class="hint">⚡ SPEED MODE · Every apple makes you faster! · Enter name for leaderboard</div>
        <div id="saveMessage" style="height: 24px; margin-top: 8px;"></div>
    </div>

    <!-- ===== 🎯 CUSTOM GAME OVER MODAL ===== -->
    <div id="gameoverModal" class="modal-overlay">
        <div class="gameover-modal">
            <h2>⚡ GAME OVER</h2>
            <div id="modalHighScoreBadge" class="new-highscore" style="display: none;">🏆 NEW HIGH SCORE! 🏆</div>
            <div class="score-big" id="modalScoreDisplay">0</div>
            
            <input type="text" id="playerNameInput" class="modal-input" placeholder="ENTER YOUR NAME" maxlength="20" autocomplete="off">
            
            <div class="modal-buttons">
                <button id="modalRestartBtn" class="modal-btn restart-modal-btn">⟳ RESTART</button>
                <button id="modalMenuBtn" class="modal-btn menu-modal-btn">🏠 MENU</button>
            </div>
            <p style="color: #8aaab3; margin-top: 1rem; font-size: 0.9rem;">press ENTER to save & restart</p>
        </div>
    </div>

    <!-- ===== 🎮 LOADING SCREEN ===== -->
    <div id="gameLoading" class="game-loading">
        <div class="loading-content">
            <div class="loading-snake">
                <div class="snake-head"></div>
                <div class="snake-body body1"></div>
                <div class="snake-body body2"></div>
            </div>
            <div class="loading-text">LOADING SPEED MODE</div>
            <div class="loading-sub">fetching global high score...</div>
        </div>
    </div>

    <style>
        /* ===== 🎮 LOADING SCREEN ===== */
        .game-loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 18, 20, 0.95);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .game-loading.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .loading-content {
            text-align: center;
            color: #b0e57c;
        }

        .loading-snake {
            width: 100px;
            height: 100px;
            margin: 0 auto 2rem;
            position: relative;
        }

        .snake-head {
            width: 20px;
            height: 20px;
            background: #b0e57c;
            position: absolute;
            top: 40px;
            left: 40px;
            border-radius: 4px;
            animation: moveSnake 1.2s infinite;
            box-shadow: 0 0 15px #6f9e4c;
        }

        .snake-body {
            width: 16px;
            height: 16px;
            background: #8cc084;
            position: absolute;
            border-radius: 4px;
        }

        .body1 {
            top: 40px;
            left: 20px;
            animation: moveBody1 1.2s infinite;
        }

        .body2 {
            top: 40px;
            left: 0px;
            animation: moveBody2 1.2s infinite;
        }

        @keyframes moveSnake {
            0% { transform: translateX(0); }
            25% { transform: translateX(20px); }
            50% { transform: translateY(20px) translateX(20px); }
            75% { transform: translateY(20px) translateX(0); }
            100% { transform: translateX(0); }
        }

        @keyframes moveBody1 {
            0% { transform: translateX(0); opacity: 0.9; }
            25% { transform: translateX(20px); opacity: 0.7; }
            50% { transform: translateY(20px) translateX(20px); opacity: 0.9; }
            75% { transform: translateY(20px) translateX(0); opacity: 0.7; }
            100% { transform: translateX(0); opacity: 0.9; }
        }

        @keyframes moveBody2 {
            0% { transform: translateX(0); opacity: 0.7; }
            25% { transform: translateX(20px); opacity: 0.5; }
            50% { transform: translateY(20px) translateX(20px); opacity: 0.7; }
            75% { transform: translateY(20px) translateX(0); opacity: 0.5; }
            100% { transform: translateX(0); opacity: 0.7; }
        }

        .loading-text {
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 4px;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 10px #6f9e4c;
        }

        .loading-sub {
            color: #8aaab3;
            font-size: 1rem;
        }
    </style>

    <script>
        (function(){
            "use strict";

            // ============================================
            // 🎮 YOUR GOOGLE SHEETS WEB APP URL
            // ============================================
            const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwmmbokNi1duI22Ds4f3LX2iwpqX-Ig4pDZKFl0F9z-3bVdehk83DWlHekUHJDqy4_4sA/exec";
            
            // ============================================
            // 🎮 CREATE LOADING SCREEN
            // ============================================
            function createLoadingScreen() {
                const loadingDiv = document.getElementById('gameLoading');
                return loadingDiv;
            }

            // ============================================
            // 🏆 LOAD REAL HIGH SCORE FROM SHEETS
            // ============================================
            async function loadGlobalHighScore(loadingScreen) {
                try {
                    const response = await fetch(WEB_APP_URL + '?cb=' + Date.now());
                    const topScores = await response.json();
                    
                    if (topScores && topScores.length > 0) {
                        const globalHighScore = topScores[0].score;
                        const localHighScore = localStorage.getItem('snakeHighScore') ? 
                            parseInt(localStorage.getItem('snakeHighScore')) : 0;
                        
                        highScore = Math.max(globalHighScore, localHighScore);
                        localStorage.setItem('snakeHighScore', highScore);
                        highScoreSpan.textContent = highScore;
                    }
                } catch (error) {
                    console.error('Could not load global high score:', error);
                    highScore = localStorage.getItem('snakeHighScore') ? 
                        parseInt(localStorage.getItem('snakeHighScore')) : 0;
                    highScoreSpan.textContent = highScore;
                } finally {
                    setTimeout(() => {
                        loadingScreen.classList.add('fade-out');
                        setTimeout(() => {
                            loadingScreen.style.display = 'none';
                        }, 500);
                    }, 300);
                }
            }

            // ============================================
            // 🐍 SNAKE GAME ENGINE - LEVEL 2 SPEED MODE
            // ============================================
            const GRID_SIZE = 20;
            const CELL_SIZE = 20;
            const BASE_SPEED = 200; // Start slower (200ms)
            const MIN_SPEED = 60;    // Max speed (60ms = super fast!)

            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const scoreSpan = document.getElementById('scoreDisplay');
            const levelSpan = document.getElementById('levelDisplay');
            const highScoreSpan = document.getElementById('highScoreDisplay');
            const speedFill = document.getElementById('speedFill');
            const saveMessageEl = document.getElementById('saveMessage');

            // Modal elements
            const modal = document.getElementById('gameoverModal');
            const modalScore = document.getElementById('modalScoreDisplay');
            const modalHighScoreBadge = document.getElementById('modalHighScoreBadge');
            const playerNameInput = document.getElementById('playerNameInput');
            const modalRestartBtn = document.getElementById('modalRestartBtn');
            const modalMenuBtn = document.getElementById('modalMenuBtn');

            let snake = [];
            let food = { x: 8, y: 10 };
            let direction = 'right';
            let nextDirection = 'right';
            let score = 0;
            let level = 1;
            let highScore = 0;
            let gameActive = false;
            let gameOverFlag = false;
            let gameInterval = null;
            let currentScoreForModal = 0;
            let currentSpeed = BASE_SPEED;

            // ============================================
            // ⚡ SPEED CALCULATION - Gets faster with each apple!
            // ============================================
            function calculateSpeed() {
                // Each apple makes you faster!
                // Formula: Speed = max(MIN_SPEED, BASE_SPEED - (score * 2))
                currentSpeed = Math.max(MIN_SPEED, BASE_SPEED - (score * 2));
                return currentSpeed;
            }

            function updateLevelAndSpeed() {
                // Calculate level based on speed
                const speedProgress = BASE_SPEED - currentSpeed;
                const maxProgress = BASE_SPEED - MIN_SPEED;
                level = Math.floor((speedProgress / maxProgress) * 10) + 1;
                level = Math.min(level, 10);
                
                // Update UI
                levelSpan.textContent = level;
                
                // Update speed bar
                const speedPercentage = ((BASE_SPEED - currentSpeed) / (BASE_SPEED - MIN_SPEED)) * 100;
                speedFill.style.width = Math.min(speedPercentage, 100) + '%';
                
                // Change color as speed increases
                if (level >= 8) {
                    speedFill.style.background = 'linear-gradient(90deg, #ff6b6b, #ffb347)';
                } else if (level >= 5) {
                    speedFill.style.background = 'linear-gradient(90deg, #ffb347, #b0e57c)';
                } else {
                    speedFill.style.background = 'linear-gradient(90deg, #b0e57c, #ffb347)';
                }
            }

            function restartGameInterval() {
                if (gameInterval) {
                    clearInterval(gameInterval);
                }
                gameInterval = setInterval(() => {
                    if (gameActive && !gameOverFlag) {
                        gameTick();
                    }
                }, currentSpeed);
            }

            // ============================================
            // 🎯 MODAL CONTROLS
            // ============================================
            function showGameOverModal(finalScore, isHighScore) {
                currentScoreForModal = finalScore;
                modalScore.textContent = finalScore;
                
                if (isHighScore) {
                    modalHighScoreBadge.style.display = 'block';
                } else {
                    modalHighScoreBadge.style.display = 'none';
                }
                
                playerNameInput.value = '';
                modal.classList.add('active');
                setTimeout(() => playerNameInput.focus(), 200);
            }

            function hideGameOverModal() {
                modal.classList.remove('active');
            }

            // ============================================
            // 📊 SAVE SCORE TO GOOGLE SHEETS
            // ============================================
            async function saveScoreToSheet(playerName, playerScore) {
                saveMessageEl.innerHTML = '<span class="save-confirmation">📤 Sending to leaderboard...</span>';
                
                try {
                    await fetch(WEB_APP_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ 
                            name: playerName, 
                            score: playerScore,
                            timestamp: new Date().toISOString()
                        })
                    });
                    
                    saveMessageEl.innerHTML = '<span class="save-confirmation">✅ Saved to leaderboard! Check Google Sheets</span>';
                    
                } catch (error) {
                    console.error('Save error:', error);
                    saveMessageEl.innerHTML = '<span style="color: #ffb0b0;">⚠️ Offline - saved locally</span>';
                }
                
                setTimeout(() => {
                    saveMessageEl.innerHTML = '';
                }, 4000);
            }

            // ============================================
            // 🏆 GAME OVER
            // ============================================
            function gameOver() {
                gameActive = false;
                gameOverFlag = true;
                if (gameInterval) {
                    clearInterval(gameInterval);
                    gameInterval = null;
                }
                drawBoard();
                
                if (score > 0) {
                    const isHighScore = score > highScore;
                    showGameOverModal(score, isHighScore);
                    
                    // Update high score if needed
                    if (isHighScore) {
                        highScore = score;
                        localStorage.setItem('snakeHighScore', highScore);
                        highScoreSpan.textContent = highScore;
                    }
                }
            }

            // ============================================
            // 🎮 HANDLE NAME SUBMISSION
            // ============================================
            function handleNameSubmit() {
                const playerName = playerNameInput.value.trim();
                
                if (playerName !== "") {
                    saveScoreToSheet(playerName, currentScoreForModal);
                }
                
                hideGameOverModal();
                resetGame();
            }

            // ============================================
            // 🎮 HANDLE MENU
            // ============================================
            function handleMenuClick() {
                const playerName = playerNameInput.value.trim();
                
                if (playerName !== "") {
                    saveMessageEl.innerHTML = '<span class="save-confirmation">📤 Saving score before exit...</span>';
                    saveScoreToSheet(playerName, currentScoreForModal);
                }
                
                setTimeout(() => {
                    window.location.href = 'indexsnake.html';
                }, 300);
            }

            // ============================================
            // ⚙️ GAME TICK
            // ============================================
            function gameTick() {
                if (!gameActive) return;

                direction = nextDirection;

                const head = snake[0];
                let newHead = { ...head };

                switch (direction) {
                    case 'right': newHead.x += 1; break;
                    case 'left':  newHead.x -= 1; break;
                    case 'up':    newHead.y -= 1; break;
                    case 'down':  newHead.y += 1; break;
                }

                if (newHead.x < 0 || newHead.x >= GRID_SIZE || newHead.y < 0 || newHead.y >= GRID_SIZE) {
                    gameOver();
                    return;
                }

                const isEating = (newHead.x === food.x && newHead.y === food.y);
                let newSnake = [newHead, ...snake];

                if (isEating) {
                    snake = newSnake;
                    score += 10;
                    scoreSpan.textContent = score;
                    
                    // ⚡ SPEED INCREASE! Eat apple = get faster!
                    calculateSpeed();
                    updateLevelAndSpeed();
                    restartGameInterval();
                    
                    const foodPlaced = generateRandomFood();
                    if (!foodPlaced) {
                        gameActive = false;
                        gameOverFlag = true;
                        clearInterval(gameInterval);
                        gameInterval = null;
                        drawBoard();
                        return;
                    }
                } else {
                    newSnake.pop();
                    snake = newSnake;
                }

                const headCollision = snake.slice(1).some(segment => segment.x === snake[0].x && segment.y === snake[0].y);
                if (headCollision) {
                    gameOver();
                    return;
                }

                drawBoard();
            }

            function initSnake() {
                snake = [
                    { x: 10, y: 10 },
                    { x: 9, y: 10 },
                    { x: 8, y: 10 },
                    { x: 7, y: 10 }
                ];
            }

            function generateRandomFood() {
                const maxAttempts = 2000;
                for (let attempt = 0; attempt < maxAttempts; attempt++) {
                    const randX = Math.floor(Math.random() * GRID_SIZE);
                    const randY = Math.floor(Math.random() * GRID_SIZE);
                    if (!snake.some(segment => segment.x === randX && segment.y === randY)) {
                        food = { x: randX, y: randY };
                        return true;
                    }
                }
                for (let y = 0; y < GRID_SIZE; y++) {
                    for (let x = 0; x < GRID_SIZE; x++) {
                        if (!snake.some(s => s.x === x && s.y === y)) {
                            food = { x, y };
                            return true;
                        }
                    }
                }
                return false;
            }

            function drawBoard() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Grid
                ctx.strokeStyle = '#1e3a41';
                ctx.lineWidth = 0.4;
                for (let i = 0; i <= GRID_SIZE; i++) {
                    ctx.beginPath();
                    ctx.moveTo(i * CELL_SIZE, 0);
                    ctx.lineTo(i * CELL_SIZE, canvas.height);
                    ctx.stroke();
                    ctx.moveTo(0, i * CELL_SIZE);
                    ctx.lineTo(canvas.width, i * CELL_SIZE);
                    ctx.stroke();
                }

                // Food
                ctx.fillStyle = '#ff3b4a';
                ctx.shadowBlur = 6;
                ctx.shadowColor = '#ff8caa';
                ctx.beginPath();
                ctx.arc(food.x * CELL_SIZE + CELL_SIZE/2, food.y * CELL_SIZE + CELL_SIZE/2, CELL_SIZE/2 - 2, 0, 2 * Math.PI);
                ctx.fill();
                ctx.shadowBlur = 0;
                
                ctx.fillStyle = '#ffd0d6';
                ctx.beginPath();
                ctx.arc(food.x * CELL_SIZE + 7, food.y * CELL_SIZE + 6, 2, 0, 2 * Math.PI);
                ctx.fill();

                // Snake
                for (let i = 0; i < snake.length; i++) {
                    const seg = snake[i];
                    const x = seg.x * CELL_SIZE;
                    const y = seg.y * CELL_SIZE;
                    
                    if (i === 0) {
                        ctx.fillStyle = '#b0e57c';
                        ctx.shadowBlur = 6;
                        ctx.shadowColor = '#6f9e4c';
                        ctx.fillRect(x + 2, y + 2, CELL_SIZE - 4, CELL_SIZE - 4);
                        ctx.shadowBlur = 0;
                        
                        ctx.fillStyle = '#1e2f2f';
                        if (direction === 'right') {
                            ctx.beginPath(); ctx.arc(x + 13, y + 7, 2.2, 0, 2 * Math.PI); ctx.fill();
                            ctx.beginPath(); ctx.arc(x + 13, y + 13, 2.2, 0, 2 * Math.PI); ctx.fill();
                        } else if (direction === 'left') {
                            ctx.beginPath(); ctx.arc(x + 7, y + 7, 2.2, 0, 2 * Math.PI); ctx.fill();
                            ctx.beginPath(); ctx.arc(x + 7, y + 13, 2.2, 0, 2 * Math.PI); ctx.fill();
                        } else if (direction === 'up') {
                            ctx.beginPath(); ctx.arc(x + 7, y + 7, 2.2, 0, 2 * Math.PI); ctx.fill();
                            ctx.beginPath(); ctx.arc(x + 13, y + 7, 2.2, 0, 2 * Math.PI); ctx.fill();
                        } else {
                            ctx.beginPath(); ctx.arc(x + 7, y + 13, 2.2, 0, 2 * Math.PI); ctx.fill();
                            ctx.beginPath(); ctx.arc(x + 13, y + 13, 2.2, 0, 2 * Math.PI); ctx.fill();
                        }
                    } else {
                        ctx.fillStyle = '#8cc084';
                        ctx.shadowBlur = 4;
                        ctx.shadowColor = '#507a5e';
                        ctx.fillRect(x + 2, y + 2, CELL_SIZE - 4, CELL_SIZE - 4);
                    }
                }
                ctx.shadowBlur = 0;
            }

            function setDirection(newDir) {
                if (!gameActive) return;
                if (
                    (direction === 'right' && newDir === 'left') ||
                    (direction === 'left' && newDir === 'right') ||
                    (direction === 'up' && newDir === 'down') ||
                    (direction === 'down' && newDir === 'up')
                ) {
                    return;
                }
                nextDirection = newDir;
            }

            function resetGame() {
                if (gameInterval) {
                    clearInterval(gameInterval);
                    gameInterval = null;
                }

                initSnake();
                direction = 'right';
                nextDirection = 'right';
                score = 0;
                currentSpeed = BASE_SPEED;
                level = 1;
                
                scoreSpan.textContent = score;
                levelSpan.textContent = level;
                speedFill.style.width = '0%';
                speedFill.style.background = 'linear-gradient(90deg, #b0e57c, #ffb347)';
                
                gameActive = true;
                gameOverFlag = false;
                
                generateRandomFood();
                drawBoard();
                
                restartGameInterval();
            }

            // ============================================
            // 🎮 EVENT LISTENERS
            // ============================================
            window.addEventListener('keydown', (e) => {
                if (e.key.startsWith('Arrow')) e.preventDefault();
                
                if (e.key === 'ArrowUp') setDirection('up');
                if (e.key === 'ArrowDown') setDirection('down');
                if (e.key === 'ArrowLeft') setDirection('left');
                if (e.key === 'ArrowRight') setDirection('right');
                if (e.key === 'r' || e.key === 'R') resetGame();
                
                if (e.key === 'Enter' && modal.classList.contains('active')) {
                    e.preventDefault();
                    handleNameSubmit();
                }
                
                if (e.key === 'Escape' && modal.classList.contains('active')) {
                    e.preventDefault();
                    hideGameOverModal();
                    resetGame();
                }
            });

            modalRestartBtn.addEventListener('click', handleNameSubmit);
            modalMenuBtn.addEventListener('click', handleMenuClick);

            document.querySelectorAll('.arrow-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const dir = e.currentTarget.getAttribute('data-dir');
                    if (dir) setDirection(dir);
                });
            });

            document.getElementById('restartButton').addEventListener('click', resetGame);

            // ============================================
            // 🚀 START THE GAME WITH LOADING SCREEN
            // ============================================
            
            const loadingScreen = createLoadingScreen();
            loadGlobalHighScore(loadingScreen).then(() => {
                resetGame();
            });
        })();
    </script>
</body>
</html>
